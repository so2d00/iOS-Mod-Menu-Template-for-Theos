name: Build Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix line endings
        run: |
          # استخدام perl بدلاً من sed لتجنب أخطاء الترميز ولضمان تحويل الملفات لصيغة Unix
          find . -type f \( -name "Makefile" -o -name "control" -o -name "*.xm" -o -name "*.plist" \) -exec perl -pi -e 's/\r//g' {} +

      - name: Set up Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git tmp_sdks
          mv tmp_sdks/*.sdk ~/theos/sdks/
          rm -rf tmp_sdks
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NusukTweak-Files
          path: |
            packages/*.deb
            .theos/obj/*.dylib
