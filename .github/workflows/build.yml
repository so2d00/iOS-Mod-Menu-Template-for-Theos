name: Build Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix line endings
        run: |
          find . -type f -not -path '*/.*' -exec sed -i '' 's/\r$//' {} + || find . -type f -not -path '*/.*' -exec sed -i 's/\r$//' {} +

      - name: Set up Theos
        run: |
          # تثبيت أدوات التوقيع
          brew install ldid
          
          # تحميل نظام التجميع
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # تحميل ملفات النظام للآيفون (SDK ) لضمان التوافق
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
          rm iPhoneOS14.5.sdk.tar.xz
          
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NusukTweak-Package
          path: packages/*.deb
